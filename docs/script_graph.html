<textarea hidden id="src-14">&quot;&quot;&quot;Case-data read gateway — flat, audited reads of case artifacts that have no
live-tool equivalent (precooked Volatility/Plaso output, the Redline MANS DB,
the evidence manifest).

These let agent.py route ALL of its case-data OS reads through the MCP server
instead of touching the filesystem directly. They are deliberately thin: they
READ and return — all forensic reasoning stays in the agent. Every path is
scoped to the case root and opened read-only, so the gateway can never read
outside /cases or mutate evidence.
&quot;&quot;&quot;

import hashlib
import re
import sqlite3
from pathlib import Path

CASE_ROOT = Path(&quot;/cases&quot;)
MAX_ARTIFACT_BYTES = 64 * 1024 * 1024   # absolute ceiling a caller may request
# Hard cap on bytes returned INLINE in a single response. The MCP stdio transport
# (and the agent&#x27;s token budget) cannot carry a multi-MB payload — returning a
# whole 26 MB CSV inline closes the connection and takes the server down. Large
# artifacts must be paged via `offset` or grepped from the saved tool-result cache.
SAFE_INLINE_BYTES = 1 * 1024 * 1024     # 1 MiB
# Large/raw evidence is listed with size only (not hashed in full) for speed.
_HASH_SKIP_EXT = {&quot;.e01&quot;, &quot;.001&quot;, &quot;.img&quot;, &quot;.raw&quot;, &quot;.dd&quot;, &quot;.mem&quot;, &quot;.mans&quot;, &quot;.zip&quot;,
                  &quot;.pcap&quot;, &quot;.pcapng&quot;, &quot;.vmdk&quot;, &quot;.vhd&quot;, &quot;.vhdx&quot;}


def _scoped(path: str):
    &quot;&quot;&quot;Resolve path and confirm it sits under the case root. None if it escapes.&quot;&quot;&quot;
    try:
        p = Path(path).resolve()
        p.relative_to(CASE_ROOT)
        return p
    except Exception:
        return None


def read_case_artifact(path: str, max_bytes: int = SAFE_INLINE_BYTES, offset: int = 0) -&gt; dict:
    &quot;&quot;&quot;Read a window of a (text) case artifact and return its content + SHA-256.

    For precooked tool output with no live equivalent (Volatility API-hooks
    dumps, Plaso supertimeline CSVs). Path is scoped to /cases and read-only.

    Only the requested window is read from disk (never the whole file), and the
    inline payload is hard-capped at SAFE_INLINE_BYTES so a large artifact can
    never overflow the stdio transport. For files larger than the cap, page with
    `offset` (use the returned `next_offset`) or grep the saved tool-result cache.

    Args:
        path: absolute path to the artifact, under /cases
        max_bytes: bytes to return this call (clamped to SAFE_INLINE_BYTES)
        offset: byte offset to start reading from (for paging large files)

    Returns:
        {tool, path, size_bytes, sha256, offset, returned_bytes, truncated,
         next_offset, content, error}
    &quot;&quot;&quot;
    p = _scoped(path)
    if p is None:
        return {&quot;error&quot;: f&quot;path is outside the case root {CASE_ROOT}&quot;, &quot;content&quot;: &quot;&quot;, &quot;path&quot;: path}
    if not p.is_file():
        return {&quot;error&quot;: f&quot;not a file: {path}&quot;, &quot;content&quot;: &quot;&quot;, &quot;path&quot;: path}
    # clamp the window so a huge file can never overflow the stdio transport
    want = max(0, min(int(max_bytes), SAFE_INLINE_BYTES))
    off = max(0, int(offset))
    try:
        size = p.stat().st_size
        # stream-hash the full file for chain of custody (bounded memory)
        h = hashlib.sha256()
        with p.open(&quot;rb&quot;) as fh:
            for block in iter(lambda: fh.read(1 &lt;&lt; 20), b&quot;&quot;):
                h.update(block)
        # read only the requested window — never the whole file into memory
        with p.open(&quot;rb&quot;) as fh:
            if off:
                fh.seek(off)
            chunk = fh.read(want)
        end = off + len(chunk)
        return {
            &quot;tool&quot;: &quot;read_case_artifact&quot;,
            &quot;path&quot;: str(p),
            &quot;size_bytes&quot;: size,
            &quot;sha256&quot;: h.hexdigest(),
            &quot;offset&quot;: off,
            &quot;returned_bytes&quot;: len(chunk),
            &quot;truncated&quot;: end &lt; size,
            &quot;next_offset&quot;: end if end &lt; size else None,
            &quot;content&quot;: chunk.decode(&quot;utf-8&quot;, errors=&quot;replace&quot;),
            &quot;error&quot;: None,
        }
    except Exception as exc:  # noqa: BLE001
        return {&quot;error&quot;: str(exc), &quot;content&quot;: &quot;&quot;, &quot;path&quot;: str(p)}


def search_case_artifact(path: str, pattern: str, ignore_case: bool = True,
                         max_matches: int = 300, max_line: int = 400) -&gt; dict:
    &quot;&quot;&quot;Search a (text) case artifact server-side and return ONLY matching lines.

    Read-only, scoped to /cases. Streams the file line by line (bounded memory)
    and returns just the matched lines (capped) — so the agent searches case data
    THROUGH the MCP server instead of dumping it to a local file and grepping it.
    The MCP analogue of grep over precooked output (Plaso supertimeline CSVs, etc.).

    Args:
        path: absolute path to the artifact, under /cases
        pattern: a Python regular expression matched per line
        ignore_case: case-insensitive matching (default True)
        max_matches: cap on matching lines returned
        max_line: truncate each returned line to this many characters

    Returns:
        {tool, path, pattern, match_count, returned, truncated,
         matches: [{line, text}], error}
    &quot;&quot;&quot;
    p = _scoped(path)
    if p is None:
        return {&quot;error&quot;: f&quot;path is outside the case root {CASE_ROOT}&quot;, &quot;matches&quot;: [], &quot;path&quot;: path}
    if not p.is_file():
        return {&quot;error&quot;: f&quot;not a file: {path}&quot;, &quot;matches&quot;: [], &quot;path&quot;: path}
    try:
        rx = re.compile(pattern, re.IGNORECASE if ignore_case else 0)
    except re.error as exc:
        return {&quot;error&quot;: f&quot;invalid regex: {exc}&quot;, &quot;matches&quot;: [], &quot;path&quot;: str(p)}
    matches = []
    count = 0
    try:
        with p.open(&quot;r&quot;, errors=&quot;replace&quot;) as fh:
            for i, line in enumerate(fh, 1):
                if rx.search(line):
                    count += 1
                    if len(matches) &lt; max_matches:
                        matches.append({&quot;line&quot;: i, &quot;text&quot;: line.rstrip(&quot;\n&quot;)[:max_line]})
        return {
            &quot;tool&quot;: &quot;search_case_artifact&quot;,
            &quot;path&quot;: str(p),
            &quot;pattern&quot;: pattern,
            &quot;match_count&quot;: count,
            &quot;returned&quot;: len(matches),
            &quot;truncated&quot;: count &gt; len(matches),
            &quot;matches&quot;: matches,
            &quot;error&quot;: None,
        }
    except Exception as exc:  # noqa: BLE001
        return {&quot;error&quot;: str(exc), &quot;matches&quot;: [], &quot;path&quot;: str(p)}


def query_mans(mans_path: str, sql: str, params: list = None, limit: int = 5000) -&gt; dict:
    &quot;&quot;&quot;Run one read-only SELECT against a Redline Memoryze MANS SQLite database.

    The MANS DB has no live-tool equivalent, so the agent&#x27;s queries execute here
    (file opened read-only, SELECT-only) and rows are returned. The query logic
    stays in the agent; this performs only the scoped, read-only DB access.

    Args:
        mans_path: absolute path to the .mans file, under /cases
        sql: a single SELECT statement (anything else is rejected)
        params: optional bound parameters
        limit: max rows returned

    Returns:
        {tool, path, columns, rows, rowcount, truncated, error}
    &quot;&quot;&quot;
    p = _scoped(mans_path)
    if p is None:
        return {&quot;error&quot;: f&quot;path is outside the case root {CASE_ROOT}&quot;, &quot;rows&quot;: []}
    if not p.is_file():
        return {&quot;error&quot;: f&quot;not a file: {mans_path}&quot;, &quot;rows&quot;: []}
    s = (sql or &quot;&quot;).strip().rstrip(&quot;;&quot;)
    if not s.lower().startswith(&quot;select&quot;):
        return {&quot;error&quot;: &quot;only a single SELECT statement is permitted&quot;, &quot;rows&quot;: []}
    if &quot;;&quot; in s:
        return {&quot;error&quot;: &quot;multiple statements are not permitted&quot;, &quot;rows&quot;: []}
    try:
        con = sqlite3.connect(f&quot;file:{p}?mode=ro&quot;, uri=True)
        try:
            cur = con.execute(s, list(params or []))
            cols = [d[0] for d in cur.description] if cur.description else []
            rows = cur.fetchmany(limit + 1)
            truncated = len(rows) &gt; limit
            return {
                &quot;tool&quot;: &quot;query_mans&quot;,
                &quot;path&quot;: str(p),
                &quot;columns&quot;: cols,
                &quot;rows&quot;: [list(r) for r in rows[:limit]],
                &quot;rowcount&quot;: min(len(rows), limit),
                &quot;truncated&quot;: truncated,
                &quot;error&quot;: None,
            }
        finally:
            con.close()
    except Exception as exc:  # noqa: BLE001
        return {&quot;error&quot;: str(exc), &quot;rows&quot;: []}


def build_evidence_manifest(case_dir: str) -&gt; dict:
    &quot;&quot;&quot;List + SHA-256 the evidence files under a case (chain-of-custody manifest).

    Large/raw images are listed with size only (not hashed in full) for speed.
    Replaces the agent&#x27;s direct rglob+hashlib walk. Read-only, scoped to /cases.

    Args:
        case_dir: absolute path to the case directory, under /cases

    Returns:
        {tool, evidence_dir, files: {relpath: {sha256, size_bytes, hashed}},
         count, error}
    &quot;&quot;&quot;
    p = _scoped(case_dir)
    if p is None:
        return {&quot;error&quot;: f&quot;path is outside the case root {CASE_ROOT}&quot;, &quot;files&quot;: {}}
    ev = p / &quot;evidence&quot;
    if not ev.is_dir():
        return {&quot;error&quot;: f&quot;no evidence dir at {ev}&quot;, &quot;files&quot;: {}}
    files: dict = {}
    try:
        for f in sorted(ev.rglob(&quot;*&quot;)):
            if not f.is_file():
                continue
            rel = str(f.relative_to(ev))
            size = f.stat().st_size
            if f.suffix.lower() in _HASH_SKIP_EXT:
                files[rel] = {&quot;sha256&quot;: None, &quot;size_bytes&quot;: size, &quot;hashed&quot;: False}
            else:
                h = hashlib.sha256()
                with f.open(&quot;rb&quot;) as fh:
                    for chunk in iter(lambda: fh.read(1 &lt;&lt; 20), b&quot;&quot;):
                        h.update(chunk)
                files[rel] = {&quot;sha256&quot;: h.hexdigest(), &quot;size_bytes&quot;: size, &quot;hashed&quot;: True}
        return {
            &quot;tool&quot;: &quot;build_evidence_manifest&quot;,
            &quot;evidence_dir&quot;: str(ev),
            &quot;files&quot;: files,
            &quot;count&quot;: len(files),
            &quot;error&quot;: None,
        }
    except Exception as exc:  # noqa: BLE001
        return {&quot;error&quot;: str(exc), &quot;files&quot;: files}
</textarea>
<textarea hidden id="src-15">&quot;&quot;&quot;Windows event log parser — parse_event_logs MCP tool function.

Uses EvtxECmd (EZ Tools) if available, falls back to evtx_dump.
Filters to key security event IDs and applies suspicious pattern detection.

Based in part on marez8505/find-evil evtx.py (MIT licence).
&quot;&quot;&quot;

import csv
import json
import re
from pathlib import Path
from parsers.common import run_tool, save_raw_output, tool_missing_response

# ── Key event IDs ──────────────────────────────────────────────────────────
KEY_EVENT_IDS: dict[int, str] = {
    4624: &quot;Logon success&quot;,
    4625: &quot;Logon failure&quot;,
    4648: &quot;Explicit credential use (Pass-the-Hash indicator)&quot;,
    4688: &quot;Process creation&quot;,
    4698: &quot;Scheduled task created&quot;,
    4702: &quot;Scheduled task modified&quot;,
    4720: &quot;User account created&quot;,
    4732: &quot;User added to security group&quot;,
    4740: &quot;Account locked out&quot;,
    7045: &quot;New service installed&quot;,
    1102: &quot;Security audit log cleared&quot;,
    4104: &quot;PowerShell script block logged&quot;,
    4103: &quot;PowerShell module logging&quot;,
}

# ── Suspicious payload patterns ────────────────────────────────────────────
# (regex, human reason, MITRE technique, kill-chain stage)
SUSPICIOUS_PATTERNS: list[tuple[str, str, str, str]] = [
    (
        r&quot;powershell.{0,30}(-enc|-encodedcommand|-e\s+[A-Za-z0-9+/]{10})&quot;,
        &quot;Encoded PowerShell command&quot;,
        &quot;T1059.001&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;(-nop|-noprofile).{0,50}(-w\s*h|-windowstyle\s*hidden)&quot;,
        &quot;Hidden PowerShell window&quot;,
        &quot;T1059.001&quot;, &quot;defense-evasion&quot;,
    ),
    (
        r&quot;(certutil|bitsadmin|mshta|regsvr32|wmic|cscript|wscript).{0,60}https?://&quot;,
        &quot;LOL binary downloading from web&quot;,
        &quot;T1105&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;cmd\.exe.{0,20}/c.{0,50}powershell&quot;,
        &quot;CMD spawning PowerShell&quot;,
        &quot;T1059.001&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;net\s+(user|localgroup|group).{0,40}(admin|administrator)&quot;,
        &quot;Account or group manipulation&quot;,
        &quot;T1136&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;schtasks.{0,20}/create&quot;,
        &quot;Scheduled task creation&quot;,
        &quot;T1053.005&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;reg\s+(add|delete).{0,60}(run|startup|currentversion)&quot;,
        &quot;Registry run-key manipulation&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(IEX|Invoke-Expression|Invoke-Command).{0,80}(http|Download)&quot;,
        &quot;PowerShell download cradle&quot;,
        &quot;T1059.001&quot;, &quot;execution&quot;,
    ),
]

MAX_KEY_EVENTS = 500   # output bound — never return more than this


def parse_event_logs(evtx_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Parse Windows event log (.evtx) and return key security events.

    Tries EvtxECmd (EZ Tools) first; falls back to evtx_dump.
    Filters to KEY_EVENT_IDS and scores events against SUSPICIOUS_PATTERNS.

    Args:
        evtx_path: Path to a .evtx file or directory of .evtx files
        output_dir: Write directory for raw/CSV output (audit trail)

    Returns:
        {
            tool, artifact, total_key_events, suspicious_count,
            key_events: [ {event_id, description, time, computer,
                           payload_preview, suspicious, reason,
                           mitre_technique, kill_chain_stage,
                           confidence} ],
            suspicious: [ same shape, only flagged entries ],
            error
        }
    &quot;&quot;&quot;
    # ── Try EvtxECmd ──
    # EvtxECmd uses -f for a single .evtx file and -d for a directory of them;
    # passing -f with a directory silently parses nothing (returns 0 events).
    ecmd_flag = &quot;-d&quot; if Path(evtx_path).is_dir() else &quot;-f&quot;
    ecmd_result = run_tool(
        [&quot;EvtxECmd&quot;, ecmd_flag, evtx_path,
         &quot;--csv&quot;, output_dir, &quot;--csvf&quot;, &quot;evtx_parsed.csv&quot;],
        timeout=300,
    )

    if not ecmd_result[&quot;tool_missing&quot;] and ecmd_result[&quot;returncode&quot;] == 0:
        return _parse_evtxecmd_csv(output_dir, evtx_path)

    # ── Fallback: evtx_dump ──
    dump_result = run_tool(
        [&quot;evtx_dump&quot;, &quot;--format&quot;, &quot;json&quot;, evtx_path],
        timeout=120,
    )

    if dump_result[&quot;tool_missing&quot;]:
        return tool_missing_response(
            &quot;evtx_dump / EvtxECmd&quot;,
            &quot;Install evtx_dump: pip3 install evtx  &quot;
            &quot;or EZ Tools EvtxECmd from https://ericzimmerman.github.io/&quot;,
        )

    save_raw_output(output_dir, &quot;evtx_dump.jsonl&quot;, dump_result[&quot;stdout&quot;])
    return _parse_evtx_dump_jsonl(dump_result[&quot;stdout&quot;], evtx_path)


# ── parsers ────────────────────────────────────────────────────────────────

def _score_payload(payload: str) -&gt; tuple[bool, str, str, str]:
    &quot;&quot;&quot;Return (suspicious, reason, technique, stage) for a payload string.&quot;&quot;&quot;
    for pattern, reason, technique, stage in SUSPICIOUS_PATTERNS:
        if re.search(pattern, payload, re.IGNORECASE):
            return True, reason, technique, stage
    return False, &quot;&quot;, &quot;&quot;, &quot;&quot;


def _parse_evtxecmd_csv(output_dir: str, artifact: str) -&gt; dict:
    csv_path = Path(output_dir) / &quot;evtx_parsed.csv&quot;
    if not csv_path.exists():
        return {
            &quot;error&quot;: &quot;EvtxECmd ran but produced no CSV output&quot;,
            &quot;suspicious&quot;: [], &quot;key_events&quot;: [],
        }

    key_events: list[dict] = []
    suspicious: list[dict] = []

    with open(csv_path, newline=&quot;&quot;, encoding=&quot;utf-8-sig&quot;, errors=&quot;replace&quot;) as f:
        reader = csv.DictReader(f)
        for row in reader:
            try:
                eid = int(row.get(&quot;EventId&quot;, 0))
            except ValueError:
                continue
            if eid not in KEY_EVENT_IDS:
                continue

            payload = row.get(&quot;Payload&quot;, &quot;&quot;) or row.get(&quot;MapDescription&quot;, &quot;&quot;)
            susp, reason, technique, stage = _score_payload(payload)

            entry = {
                &quot;event_id&quot;:    eid,
                &quot;description&quot;: KEY_EVENT_IDS[eid],
                &quot;time&quot;:        row.get(&quot;TimeCreated&quot;, &quot;&quot;),
                &quot;computer&quot;:    row.get(&quot;Computer&quot;, &quot;&quot;),
                &quot;payload_preview&quot;: payload[:400],
                &quot;suspicious&quot;:  susp,
                &quot;reason&quot;:      reason,
                &quot;mitre_technique&quot;: technique,
                &quot;kill_chain_stage&quot;: stage,
                &quot;confidence&quot;:  &quot;high&quot; if susp else &quot;low&quot;,
            }
            key_events.append(entry)
            if susp:
                suspicious.append(entry)
            if len(key_events) &gt;= MAX_KEY_EVENTS:
                break

    return {
        &quot;tool&quot;: &quot;EvtxECmd&quot;,
        &quot;artifact&quot;: artifact,
        &quot;total_key_events&quot;: len(key_events),
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;key_events&quot;: key_events,
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: None,
    }


def _parse_evtx_dump_jsonl(stdout: str, artifact: str) -&gt; dict:
    key_events: list[dict] = []
    suspicious: list[dict] = []

    for line in stdout.splitlines():
        line = line.strip()
        if not line:
            continue
        try:
            event = json.loads(line)
        except json.JSONDecodeError:
            continue

        try:
            eid = int(
                event.get(&quot;Event&quot;, {})
                     .get(&quot;System&quot;, {})
                     .get(&quot;EventID&quot;, 0)
            )
        except (TypeError, ValueError):
            continue

        if eid not in KEY_EVENT_IDS:
            continue

        system     = event.get(&quot;Event&quot;, {}).get(&quot;System&quot;, {})
        event_data = event.get(&quot;Event&quot;, {}).get(&quot;EventData&quot;, {})
        payload    = json.dumps(event_data)

        susp, reason, technique, stage = _score_payload(payload)

        entry = {
            &quot;event_id&quot;:    eid,
            &quot;description&quot;: KEY_EVENT_IDS[eid],
            &quot;time&quot;:        system.get(&quot;TimeCreated&quot;, {}).get(&quot;@SystemTime&quot;, &quot;&quot;),
            &quot;computer&quot;:    system.get(&quot;Computer&quot;, &quot;&quot;),
            &quot;payload_preview&quot;: payload[:400],
            &quot;suspicious&quot;:  susp,
            &quot;reason&quot;:      reason,
            &quot;mitre_technique&quot;: technique,
            &quot;kill_chain_stage&quot;: stage,
            &quot;confidence&quot;:  &quot;high&quot; if susp else &quot;low&quot;,
        }
        key_events.append(entry)
        if susp:
            suspicious.append(entry)
        if len(key_events) &gt;= MAX_KEY_EVENTS:
            break

    return {
        &quot;tool&quot;: &quot;evtx_dump&quot;,
        &quot;artifact&quot;: artifact,
        &quot;total_key_events&quot;: len(key_events),
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;key_events&quot;: key_events,
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: None,
    }
</textarea>
<textarea hidden id="src-16">&quot;&quot;&quot;Disk filesystem analyser — analyze_disk_filesystem MCP tool function.

Uses MFTECmd (EZ Tools) if available; falls back to fls (TSK).
Returns file listing with suspicious path highlighting: startup folders,
temp/writable paths, recently modified system binaries.

Based in part on marez8505/find-evil mft.py (MIT licence).
&quot;&quot;&quot;

import csv
import re
from pathlib import Path
from parsers.common import run_tool, save_raw_output, tool_missing_response

MAX_SUSPICIOUS = 300

# ── Paths that should not contain executables ──────────────────────────────
SUSPICIOUS_PATH_PATTERNS = [
    (
        r&quot;\\(appdata\\local\\temp|temp|tmp|windows\\temp)\\.*\.(exe|dll|ps1|bat|vbs|hta|cmd|scr)&quot;,
        &quot;Executable in temp directory&quot;,
        &quot;T1204&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;\\users\\public\\.*\.(exe|dll|ps1|bat|vbs|hta)&quot;,
        &quot;Executable in Public user directory&quot;,
        &quot;T1204&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;\\start menu\\programs\\startup\\&quot;,
        &quot;File in startup folder (persistence)&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;\\programdata\\microsoft\\windows\\start menu\\programs\\startup\\&quot;,
        &quot;File in system-wide startup folder (persistence)&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;\\windows\\(system32|syswow64)\\.*\.(ps1|bat|vbs|hta)&quot;,
        &quot;Script in system32/syswow64&quot;,
        &quot;T1036&quot;, &quot;defense-evasion&quot;,
    ),
    (
        r&quot;\\recycle\.bin\\|\\recycler\\&quot;,
        &quot;Executable recovered from Recycle Bin&quot;,
        &quot;T1070.004&quot;, &quot;defense-evasion&quot;,
    ),
    (

        &quot;Prefetch file (evidence of execution)&quot;,

    ),

        r&quot;\\windows\\system32\\tasks\\&quot;,
        &quot;Scheduled task XML in Tasks directory&quot;,
        &quot;T1053.005&quot;, &quot;persistence&quot;,
    ),
]


def analyze_disk_filesystem(image_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Analyse disk image filesystem structure for suspicious entries.

    Uses MFTECmd (EZ Tools) preferentially for $MFT parsing; falls back
    to fls (TSK) for raw filesystem listing.

    Args:
        image_path: Path to disk image (.e01, .dd, .img) or mounted root
        output_dir: Write directory for raw output (audit trail)

    Returns:
        {
            tool, image_path, total_files_scanned, suspicious_count,
            suspicious: [ {path, size_bytes, created, modified, accessed,
                           reason, mitre_technique, kill_chain_stage,
                           confidence} ],
            error
        }
    &quot;&quot;&quot;
    # ── Try MFTECmd on $MFT file ──
    mft_path = _find_mft(image_path)
    if mft_path:
        r = run_tool(
            [&quot;MFTECmd&quot;, &quot;-f&quot;, mft_path, &quot;--csv&quot;, output_dir, &quot;--csvf&quot;, &quot;mft_parsed.csv&quot;],
            timeout=300,
        )
        if not r[&quot;tool_missing&quot;] and r[&quot;returncode&quot;] == 0:
            return _parse_mftecmd_csv(output_dir, image_path)

    # ── Fallback: fls (TSK) ──
    r = run_tool([&quot;fls&quot;, &quot;-r&quot;, &quot;-p&quot;, image_path], timeout=300)

    if r[&quot;tool_missing&quot;]:
        return tool_missing_response(
            &quot;fls / MFTECmd&quot;,
            &quot;Install TSK: sudo apt-get install -y sleuthkit  &quot;
            &quot;or MFTECmd from https://ericzimmerman.github.io/&quot;,
        )

    save_raw_output(output_dir, &quot;fls_recursive.txt&quot;, r[&quot;stdout&quot;])
    return _parse_fls_output(r[&quot;stdout&quot;], image_path)


# ── MFTECmd CSV parser ─────────────────────────────────────────────────────

def _parse_mftecmd_csv(output_dir: str, image_path: str) -&gt; dict:
    csv_path = Path(output_dir) / &quot;mft_parsed.csv&quot;
    if not csv_path.exists():
        return {&quot;error&quot;: &quot;MFTECmd produced no CSV&quot;, &quot;suspicious&quot;: [], &quot;total_files_scanned&quot;: 0}

    suspicious: list[dict] = []
    total = 0

    with open(csv_path, newline=&quot;&quot;, encoding=&quot;utf-8-sig&quot;, errors=&quot;replace&quot;) as f:
        reader = csv.DictReader(f)
        for row in reader:
            total += 1
            path = (row.get(&quot;ParentPath&quot;, &quot;&quot;) + &quot;\\&quot; + row.get(&quot;FileName&quot;, &quot;&quot;)).lower()

            for pattern, reason, technique, stage in SUSPICIOUS_PATH_PATTERNS:
                if re.search(pattern, path, re.IGNORECASE):
                    suspicious.append({
                        &quot;path&quot;:            path,
                        &quot;size_bytes&quot;:      row.get(&quot;FileSize&quot;, &quot;&quot;),
                        &quot;created&quot;:         row.get(&quot;Created0x10&quot;, &quot;&quot;),
                        &quot;modified&quot;:        row.get(&quot;LastModified0x10&quot;, &quot;&quot;),
                        &quot;accessed&quot;:        row.get(&quot;LastAccess0x10&quot;, &quot;&quot;),
                        &quot;reason&quot;:          reason,
                        &quot;mitre_technique&quot;: technique,
                        &quot;kill_chain_stage&quot;: stage,
                        &quot;confidence&quot;:      &quot;medium&quot;,
                    })
                    break

            if len(suspicious) &gt;= MAX_SUSPICIOUS:
                break

    return {
        &quot;tool&quot;: &quot;MFTECmd&quot;,
        &quot;image_path&quot;: image_path,
        &quot;total_files_scanned&quot;: total,
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: None,
    }


# ── fls fallback parser ────────────────────────────────────────────────────

def _parse_fls_output(stdout: str, image_path: str) -&gt; dict:
    &quot;&quot;&quot;Parse fls -r -p output (inode type path lines).&quot;&quot;&quot;
    suspicious: list[dict] = []
    total = 0

    for line in stdout.splitlines():
        # fls format: [d/d|r/r] inode-addr:   path
        parts = line.split(&quot;\t&quot;)
        if len(parts) &lt; 2:
            continue
        path = parts[-1].strip().lower()
        total += 1

        for pattern, reason, technique, stage in SUSPICIOUS_PATH_PATTERNS:
            if re.search(pattern, path, re.IGNORECASE):
                suspicious.append({
                    &quot;path&quot;:            path,
                    &quot;reason&quot;:          reason,
                    &quot;mitre_technique&quot;: technique,
                    &quot;kill_chain_stage&quot;: stage,
                    &quot;confidence&quot;:      &quot;medium&quot;,
                })
                break

        if len(suspicious) &gt;= MAX_SUSPICIOUS:
            break

    return {
        &quot;tool&quot;: &quot;fls&quot;,
        &quot;image_path&quot;: image_path,
        &quot;total_files_scanned&quot;: total,
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: None,
    }


# ── helpers ────────────────────────────────────────────────────────────────

def _find_mft(image_path: str) -&gt; str | None:
    &quot;&quot;&quot;If image_path is a mounted directory, look for $MFT in its root.&quot;&quot;&quot;
    p = Path(image_path)
    if p.is_dir():
        mft = p / &quot;$MFT&quot;
        return str(mft) if mft.exists() else None
    return None

def hunt_lotl_behaviors(evtx_dir: str, output_dir: str,
                        sigma_rules_dir: str = &quot;/opt/sigma&quot;) -&gt; dict:
    &quot;&quot;&quot;Detect Living-off-the-Land behaviours in Windows event logs.

    Pass 1 — Chainsaw: runs Sigma rules against all .evtx files in evtx_dir.
    Pass 2 — LOLBAS:   cross-references Chainsaw hits (and cmdline strings)
              against the LOLBAS catalogue with suspicious argument patterns.

    Args:
        evtx_dir:       Directory containing .evtx files
        output_dir:     Write directory for raw output (audit trail)

                        (default /opt/sigma, installed by Chainsaw package)

    Returns:
        {
            tool, evtx_dir,
            chainsaw_hits: int,

                          mitre_technique, kill_chain_stage, confidence} ],
            error
        }

    findings:  list[dict] = []
    errors:    list[str]  = []

    # ── Pass 1: Chainsaw ───────────────────────────────────────────────────
    chainsaw_hits = _run_chainsaw(evtx_dir, output_dir, sigma_rules_dir, findings, errors)

    # ── Pass 2: LOLBAS pattern scan on cmdline events ─────────────────────
    lolbas_hits = _run_lolbas_scan(evtx_dir, output_dir, findings, errors)

    # Deduplicate by (binary, cmdline[:80])
    seen:   set[tuple[str, str]] = set()
    unique: list[dict]           = []
    for f in findings:
        key = (f.get(&quot;binary&quot;, &quot;&quot;), f.get(&quot;cmdline&quot;, &quot;&quot;)[:80])
        if key not in seen:
            seen.add(key)
            unique.append(f)

    return {
        &quot;tool&quot;: &quot;chainsaw+lolbas&quot;,
        &quot;evtx_dir&quot;: evtx_dir,
        &quot;chainsaw_hits&quot;: chainsaw_hits,
        &quot;lolbas_hits&quot;: lolbas_hits,
        &quot;findings_count&quot;: len(unique),
        &quot;findings&quot;: unique[:MAX_FINDINGS],
        &quot;error&quot;: &quot;; &quot;.join(errors) if errors else None,
    }


# ── Pass 1: Chainsaw ───────────────────────────────────────────────────────

def _run_chainsaw(
    evtx_dir:    str,
    output_dir:  str,
    sigma_dir:   str,
    findings:    list[dict],
    errors:      list[str],
) -&gt; int:
    sigma_path = Path(sigma_dir)
    if not sigma_path.exists():
        # Try Chainsaw&#x27;s bundled rules
        sigma_dir = &quot;/opt/chainsaw/sigma&quot;

    r = run_tool(
        [&quot;chainsaw&quot;, &quot;hunt&quot;, evtx_dir,
         &quot;--sigma&quot;, sigma_dir,
         &quot;--mapping&quot;, &quot;/opt/chainsaw/mappings/sigma-event-logs-all.yml&quot;,
         &quot;--output&quot;, output_dir,
         &quot;--format&quot;, &quot;json&quot;],
        timeout=300,
    )

    if r[&quot;tool_missing&quot;]:
        errors.append(
            &quot;Chainsaw not found. Install: &quot;
            &quot;wget https://github.com/WithSecureLabs/chainsaw/releases/latest&quot;
            &quot;/download/chainsaw_x86_64-unknown-linux-gnu.tar.gz&quot;
        )
        return 0

    save_raw_output(output_dir, &quot;chainsaw_output.txt&quot;, r[&quot;stdout&quot;])

    hit_count = 0
    chainsaw_json = Path(output_dir) / &quot;chainsaw_results.json&quot;
    raw = r[&quot;stdout&quot;]

    # Chainsaw may write to file or stdout depending on version
    if chainsaw_json.exists():
        raw = chainsaw_json.read_text()

    for line in raw.splitlines():
        line = line.strip()
        if not line or not line.startswith(&quot;{&quot;):
            continue
        try:
            hit = json.loads(line)
            findings.append({
                &quot;source&quot;:          &quot;chainsaw&quot;,
                &quot;rule&quot;:            hit.get(&quot;name&quot;, hit.get(&quot;rule&quot;, &quot;?&quot;)),
                &quot;event_id&quot;:        hit.get(&quot;event_id&quot;, &quot;&quot;),
                &quot;time&quot;:            hit.get(&quot;timestamp&quot;, &quot;&quot;),
                &quot;binary&quot;:          _extract_binary(hit),
                &quot;cmdline&quot;:         hit.get(&quot;cmdline&quot;, hit.get(&quot;data&quot;, {}).get(&quot;CommandLine&quot;, &quot;&quot;))[:300],
                &quot;reason&quot;:          hit.get(&quot;name&quot;, &quot;Sigma rule match&quot;),
                &quot;mitre_technique&quot;: hit.get(&quot;tags&quot;, [&quot;T1059&quot;])[0] if hit.get(&quot;tags&quot;) else &quot;T1059&quot;,
                &quot;kill_chain_stage&quot;:&quot;execution&quot;,
                &quot;confidence&quot;:      &quot;high&quot;,
            })
            hit_count += 1
        except (json.JSONDecodeError, KeyError):
            continue

    return hit_count


# ── Pass 2: LOLBAS pattern scan ────────────────────────────────────────────

def _run_lolbas_scan(
    evtx_dir:   str,
    output_dir: str,
    findings:   list[dict],
    errors:     list[str],
) -&gt; int:
    &quot;&quot;&quot;Scan event-log cmdline strings for LOLBAS patterns.&quot;&quot;&quot;
    # Use evtx_dump to get process creation events quickly
    hit_count = 0
    for evtx_file in Path(evtx_dir).rglob(&quot;*.evtx&quot;):
        r = run_tool([&quot;evtx_dump&quot;, &quot;--format&quot;, &quot;json&quot;, str(evtx_file)], timeout=60)
        if r[&quot;tool_missing&quot;]:
            break
        if r[&quot;returncode&quot;] != 0:
            continue

        for line in r[&quot;stdout&quot;].splitlines():
            try:
                event = json.loads(line)
                eid = int(
                    event.get(&quot;Event&quot;, {}).get(&quot;System&quot;, {}).get(&quot;EventID&quot;, 0)
                )
                if eid != 4688:
                    continue

                data    = event.get(&quot;Event&quot;, {}).get(&quot;EventData&quot;, {})
                cmdline = (data.get(&quot;CommandLine&quot;) or data.get(&quot;NewProcessName&quot;) or &quot;&quot;).lower()
                if not cmdline:
                    continue

                # Extract binary name
                binary = Path(cmdline.split()[0].strip(&#x27;&quot;&#x27;)).name.lower() if cmdline else &quot;&quot;

                if binary not in LOLBAS_BINARIES:
                    continue

                for lol_bin, arg_re, reason, technique, stage in LOLBAS_PATTERNS:
                    if binary == lol_bin and re.search(arg_re, cmdline, re.IGNORECASE):
                        findings.append({
                            &quot;source&quot;:           &quot;lolbas&quot;,
                            &quot;binary&quot;:           binary,
                            &quot;cmdline&quot;:          cmdline[:300],
                            &quot;event_id&quot;:         4688,
                            &quot;time&quot;:             event.get(&quot;Event&quot;, {})
                                                     .get(&quot;System&quot;, {})
                                                     .get(&quot;TimeCreated&quot;, {})
                                                     .get(&quot;@SystemTime&quot;, &quot;&quot;),
                            &quot;reason&quot;:           reason,
                            &quot;mitre_technique&quot;:  technique,
                            &quot;kill_chain_stage&quot;: stage,
                            &quot;confidence&quot;:       &quot;high&quot;,
                        })
                        hit_count += 1
                        break

            except (json.JSONDecodeError, ValueError, KeyError, IndexError):
                continue

    return hit_count


def _extract_binary(hit: dict) -&gt; str:
    &quot;&quot;&quot;Best-effort binary name extraction from a Chainsaw hit dict.&quot;&quot;&quot;
    for key in (&quot;NewProcessName&quot;, &quot;CommandLine&quot;, &quot;ImagePath&quot;, &quot;Image&quot;):
        val = hit.get(key) or hit.get(&quot;data&quot;, {}).get(key, &quot;&quot;)
        if val:
            return Path(str(val).split()[0].strip(&#x27;&quot;&#x27;)).name.lower()
    return &quot;?&quot;

<textarea hidden id="src-18">&quot;&quot;&quot;Network capture analyser — analyze_network_capture MCP tool function.

Uses tshark to extract TCP conversations, DNS queries, and HTTP requests.
Flags external IPs, unusual TLDs, beaconing patterns, and large transfers.

Based in part on marez8505/find-evil network.py (MIT licence).
&quot;&quot;&quot;

import re
from parsers.common import run_tool, save_raw_output, tool_missing_response, is_private_ip

MAX_CONVERSATIONS = 100
MAX_DNS           = 200
MAX_HTTP          = 200

SUSPICIOUS_TLDS = {&quot;.ru&quot;, &quot;.cn&quot;, &quot;.top&quot;, &quot;.xyz&quot;, &quot;.tk&quot;, &quot;.pw&quot;, &quot;.cc&quot;, &quot;.onion&quot;}

INSTALL_HINT = &quot;sudo apt-get install -y tshark&quot;


def analyze_network_capture(pcap_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Analyse a network capture for C2, beaconing, and data exfiltration.

    Extracts TCP/UDP conversation summary, DNS queries, and HTTP requests.
    Flags connections to non-RFC-1918 IPs, suspicious TLDs, and large
    outbound transfers.

    Args:
        pcap_path: Path to .pcap or .pcapng file
        output_dir: Write directory for raw output (audit trail)

    Returns:
        {
            tool, artifact,
            conversations: [ {src, dst, bytes, packets, suspicious, reason} ],
            dns_queries:   [ {time, src, query, suspicious, reason} ],
            http_requests: [ {time, src, host, uri, suspicious, reason} ],
            suspicious_count,
            error
        }
    &quot;&quot;&quot;
    if not _tshark_available():
        return tool_missing_response(&quot;tshark&quot;, INSTALL_HINT)

    conversations = _extract_conversations(pcap_path, output_dir)
    dns_queries   = _extract_dns(pcap_path, output_dir)
    http_requests = _extract_http(pcap_path, output_dir)

    all_suspicious = (
        [c for c in conversations if c.get(&quot;suspicious&quot;)]
        + [d for d in dns_queries   if d.get(&quot;suspicious&quot;)]
        + [h for h in http_requests if h.get(&quot;suspicious&quot;)]
    )

    return {
        &quot;tool&quot;: &quot;tshark&quot;,
        &quot;artifact&quot;: pcap_path,
        &quot;conversations&quot;: conversations,
        &quot;dns_queries&quot;:   dns_queries,
        &quot;http_requests&quot;: http_requests,
        &quot;suspicious_count&quot;: len(all_suspicious),
        &quot;suspicious&quot;: all_suspicious,
        &quot;error&quot;: None,
    }


# ── extractors ─────────────────────────────────────────────────────────────

def _extract_conversations(pcap_path: str, output_dir: str) -&gt; list[dict]:
    r = run_tool(
        [&quot;tshark&quot;, &quot;-r&quot;, pcap_path, &quot;-q&quot;, &quot;-z&quot;, &quot;conv,tcp&quot;],
        timeout=60,
    )
    save_raw_output(output_dir, &quot;tshark_conversations.txt&quot;, r[&quot;stdout&quot;])

    entries: list[dict] = []
    # Lines look like:  1.2.3.4:1234  &lt;-&gt;  5.6.7.8:443  100  200  ...
    conv_re = re.compile(
        r&quot;(\d+\.\d+\.\d+\.\d+):(\d+)\s+&lt;-&gt;\s+(\d+\.\d+\.\d+\.\d+):(\d+)&quot;
        r&quot;\s+(\d+)\s+(\d+)&quot;
    )
    for line in r[&quot;stdout&quot;].splitlines():
        m = conv_re.search(line)
        if not m:
            continue
        src_ip, src_port, dst_ip, dst_port = m.group(1), m.group(2), m.group(3), m.group(4)
        pkts, byts = int(m.group(5)), int(m.group(6))

        entry: dict = {
            &quot;src&quot;: f&quot;{src_ip}:{src_port}&quot;,
            &quot;dst&quot;: f&quot;{dst_ip}:{dst_port}&quot;,
            &quot;packets&quot;: pkts,
            &quot;bytes&quot;: byts,
            &quot;suspicious&quot;: False,
        }

        # Flag external destinations with large transfer or from internal to external
        if not is_private_ip(dst_ip) and byts &gt; 1_000_000:
            entry.update(
                suspicious=True,
                reason=f&quot;Large outbound transfer to {dst_ip} ({byts:,} bytes)&quot;,
                mitre_technique=&quot;T1048&quot;,
                kill_chain_stage=&quot;exfiltration&quot;,
                confidence=&quot;medium&quot;,
            )
        elif not is_private_ip(dst_ip):
            entry.update(
                suspicious=True,
                reason=f&quot;External connection to {dst_ip}:{dst_port}&quot;,
                mitre_technique=&quot;T1071&quot;,
                kill_chain_stage=&quot;command-and-control&quot;,
                confidence=&quot;low&quot;,
            )

        entries.append(entry)
        if len(entries) &gt;= MAX_CONVERSATIONS:
            break

    return entries


def _extract_dns(pcap_path: str, output_dir: str) -&gt; list[dict]:
    r = run_tool(
        [&quot;tshark&quot;, &quot;-r&quot;, pcap_path, &quot;-Y&quot;, &quot;dns&quot;,
         &quot;-T&quot;, &quot;fields&quot;,
         &quot;-e&quot;, &quot;frame.time_relative&quot;,
         &quot;-e&quot;, &quot;ip.src&quot;,
         &quot;-e&quot;, &quot;dns.qry.name&quot;,
         &quot;-E&quot;, &quot;separator=|&quot;],
        timeout=60,
    )
    save_raw_output(output_dir, &quot;tshark_dns.txt&quot;, r[&quot;stdout&quot;])

    entries: list[dict] = []
    for line in r[&quot;stdout&quot;].splitlines():
        parts = line.split(&quot;|&quot;)
        if len(parts) &lt; 3 or not parts[2].strip():
            continue
        query = parts[2].strip()
        entry: dict = {
            &quot;time&quot;:  parts[0].strip(),
            &quot;src&quot;:   parts[1].strip(),
            &quot;query&quot;: query,
            &quot;suspicious&quot;: False,
        }
        # Flag suspicious TLDs
        tld = &quot;.&quot; + query.rsplit(&quot;.&quot;, 1)[-1].lower() if &quot;.&quot; in query else &quot;&quot;
        if tld in SUSPICIOUS_TLDS:
            entry.update(
                suspicious=True,
                reason=f&quot;DNS query to suspicious TLD: {tld}&quot;,
                mitre_technique=&quot;T1071.004&quot;,
                kill_chain_stage=&quot;command-and-control&quot;,
                confidence=&quot;medium&quot;,
            )
        # Flag DGA-like long random-looking subdomains
        elif len(query) &gt; 40 and re.search(r&quot;[a-z0-9]{20,}&quot;, query):
            entry.update(
                suspicious=True,
                reason=&quot;Possible DGA domain (long random-looking name)&quot;,
                mitre_technique=&quot;T1568.002&quot;,
                kill_chain_stage=&quot;command-and-control&quot;,
                confidence=&quot;medium&quot;,
            )
        entries.append(entry)
        if len(entries) &gt;= MAX_DNS:
            break

    return entries


def _extract_http(pcap_path: str, output_dir: str) -&gt; list[dict]:
    r = run_tool(
        [&quot;tshark&quot;, &quot;-r&quot;, pcap_path, &quot;-Y&quot;, &quot;http.request&quot;,
         &quot;-T&quot;, &quot;fields&quot;,
         &quot;-e&quot;, &quot;frame.time_relative&quot;,
         &quot;-e&quot;, &quot;ip.src&quot;,
         &quot;-e&quot;, &quot;http.host&quot;,
         &quot;-e&quot;, &quot;http.request.uri&quot;,
         &quot;-e&quot;, &quot;http.user_agent&quot;,
         &quot;-E&quot;, &quot;separator=|&quot;],
        timeout=60,
    )
    save_raw_output(output_dir, &quot;tshark_http.txt&quot;, r[&quot;stdout&quot;])

    entries: list[dict] = []
    for line in r[&quot;stdout&quot;].splitlines():
        parts = (line.split(&quot;|&quot;) + [&quot;&quot;, &quot;&quot;, &quot;&quot;, &quot;&quot;, &quot;&quot;])[:5]
        host  = parts[2].strip()
        uri   = parts[3].strip()
        ua    = parts[4].strip()

        entry: dict = {
            &quot;time&quot;:       parts[0].strip(),
            &quot;src&quot;:        parts[1].strip(),
            &quot;host&quot;:       host,
            &quot;uri&quot;:        uri[:300],
            &quot;user_agent&quot;: ua[:200],
            &quot;suspicious&quot;: False,
        }

        # Flag PowerShell / scripting UA
        if re.search(r&quot;(powershell|curl|wget|python|go-http-client)&quot;, ua, re.IGNORECASE):
            entry.update(
                suspicious=True,
                reason=f&quot;Scripting/automation user-agent: {ua[:80]}&quot;,
                mitre_technique=&quot;T1071.001&quot;,
                kill_chain_stage=&quot;command-and-control&quot;,
                confidence=&quot;medium&quot;,
            )
        # Flag .exe / .ps1 / .bat downloads
        elif re.search(r&quot;\.(exe|ps1|bat|cmd|dll|vbs|hta)(\?|$)&quot;, uri, re.IGNORECASE):
            entry.update(
                suspicious=True,
                reason=f&quot;Executable or script download: {uri[:100]}&quot;,
                mitre_technique=&quot;T1105&quot;,
                kill_chain_stage=&quot;execution&quot;,
                confidence=&quot;high&quot;,
            )

        entries.append(entry)
        if len(entries) &gt;= MAX_HTTP:
            break

    return entries


def _tshark_available() -&gt; bool:
    r = run_tool([&quot;tshark&quot;, &quot;--version&quot;], timeout=5)
    return not r[&quot;tool_missing&quot;] and r[&quot;returncode&quot;] == 0

<textarea hidden id="src-19">&quot;&quot;&quot;Windows registry persistence parser — parse_registry_persistence MCP tool.

Uses RECmd (EZ Tools) if available; falls back to RegRipper.
Focused on persistence key locations. Includes ClickFix-specific patterns
in run-key value data.

Based in part on marez8505/find-evil registry.py (MIT licence).
&quot;&quot;&quot;

import csv
import re
import subprocess
from pathlib import Path
from parsers.common import run_tool, save_raw_output, tool_missing_response

# ── Persistence key paths (RECmd batch filter) ─────────────────────────────
PERSISTENCE_KEYS = [
    r&quot;SOFTWARE\Microsoft\Windows\CurrentVersion\Run&quot;,
    r&quot;SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce&quot;,
    r&quot;SOFTWARE\Microsoft\Windows\CurrentVersion\RunServices&quot;,
    r&quot;SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon&quot;,
    r&quot;SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows&quot;,          # AppInit_DLLs
    r&quot;SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options&quot;,
    r&quot;SYSTEM\CurrentControlSet\Services&quot;,
    r&quot;SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Shell Folders&quot;,
    r&quot;SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders&quot;,
]

# ── Suspicious value-data patterns ────────────────────────────────────────
# (regex, reason, MITRE technique, kill-chain stage)
SUSPICIOUS_PATTERNS: list[tuple[str, str, str, str]] = [
    (
        r&quot;powershell.{0,40}(-enc|-encodedcommand|-e\s+[A-Za-z0-9+/]{10})&quot;,
        &quot;Encoded PowerShell in registry persistence key (ClickFix indicator)&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(-nop|-noprofile).{0,60}(-w\s*h|-windowstyle\s*hidden)&quot;,
        &quot;Hidden PowerShell window via registry run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(mshta|wscript|cscript).{0,80}\.(vbs|js|hta)&quot;,
        &quot;Script interpreter in persistence run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(certutil|bitsadmin).{0,80}https?://&quot;,
        &quot;Download cradle in persistence run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(appdata|temp|tmp|users\\public).{0,60}\.(exe|dll|ps1|bat|cmd)&quot;,
        &quot;Executable from writable path in persistence run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(IEX|Invoke-Expression).{0,80}(http|Download|Net\.WebClient)&quot;,
        &quot;PowerShell download cradle in persistence run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;cmd\.exe.{0,20}/c.{0,80}(powershell|mshta|wscript)&quot;,
        &quot;CMD launching interpreter from run key&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    # Winlogon hijacking
    (
        r&quot;(Userinit|Shell)\s*=.{0,200}(cmd|powershell|\.exe)&quot;,
        &quot;Winlogon Userinit or Shell key modified — potential hijack&quot;,
        &quot;T1547.004&quot;, &quot;persistence&quot;,
    ),
    # IFEO debugger hijacking
    (
        r&quot;Debugger\s*=&quot;,
        &quot;Image File Execution Options Debugger key set&quot;,
        &quot;T1546.012&quot;, &quot;persistence&quot;,
    ),
]

MAX_ENTRIES = 300


def parse_registry_persistence(hive_dir: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Parse Windows registry hives for persistence mechanisms.

    Covers Run/RunOnce, Winlogon, IFEO, Services, AppInit_DLLs, Shell Folders.
    Includes ClickFix-specific pattern detection in run-key value data.

    Args:
        hive_dir: Path to Windows\\System32\\config\\ directory (from mounted
                  image) or directory containing extracted hive files
                  (SOFTWARE, SYSTEM, NTUSER.DAT).
        output_dir: Write directory for raw CSV output (audit trail)

    Returns:
        {
            tool, hive_dir, total_entries, suspicious_count,
            persistence_entries: [ {key_path, value_name, value_data,
                                    hive, last_write_time,
                                    suspicious, reason, mitre_technique,
                                    kill_chain_stage, confidence} ],
            suspicious: [ same shape, only flagged entries ],
            error
        }
    &quot;&quot;&quot;
    hive_path = Path(hive_dir)
    if not hive_path.exists():
        return {&quot;error&quot;: f&quot;hive_dir does not exist: {hive_dir}&quot;,
                &quot;suspicious&quot;: [], &quot;persistence_entries&quot;: []}

    # ── Try RECmd (EZ Tools) ──
    recmd_result = run_tool(
        [&quot;RECmd&quot;, &quot;-d&quot;, hive_dir,
         &quot;--bn&quot;, _write_recmd_batch(output_dir),
         &quot;--csv&quot;, output_dir, &quot;--csvf&quot;, &quot;registry_persistence.csv&quot;],
        timeout=120,
    )

    if not recmd_result[&quot;tool_missing&quot;] and recmd_result[&quot;returncode&quot;] == 0:
        return _parse_recmd_csv(output_dir, hive_dir)

    # ── Fallback: RegRipper ──
    return _run_regripper(hive_dir, output_dir)


# ── RECmd helpers ──────────────────────────────────────────────────────────

def _write_recmd_batch(output_dir: str) -&gt; str:
    &quot;&quot;&quot;Write a RECmd batch file scoped to persistence keys. Returns path.&quot;&quot;&quot;
    batch_path = Path(output_dir) / &quot;persistence_batch.reb&quot;
    lines = [&quot;Description: IR persistence key batch&quot;, &quot;Author: sift-ir-agent&quot;, &quot;&quot;]
    for key in PERSISTENCE_KEYS:
        lines.append(f&#x27;HiveType:Any|Category:Persistence|KeyPath:{key}|Recursive:true|Comment:&quot;&quot;&#x27;)
    batch_path.write_text(&quot;\n&quot;.join(lines))
    return str(batch_path)


def _parse_recmd_csv(output_dir: str, hive_dir: str) -&gt; dict:
    csv_path = Path(output_dir) / &quot;registry_persistence.csv&quot;
    if not csv_path.exists():
        return {&quot;error&quot;: &quot;RECmd produced no CSV&quot;, &quot;suspicious&quot;: [], &quot;persistence_entries&quot;: []}

    entries:   list[dict] = []
    suspicious: list[dict] = []

    with open(csv_path, newline=&quot;&quot;, encoding=&quot;utf-8-sig&quot;, errors=&quot;replace&quot;) as f:
        reader = csv.DictReader(f)
        for row in reader:
            value_data = row.get(&quot;ValueData&quot;, &quot;&quot;) or &quot;&quot;
            susp, reason, technique, stage = _score_value(value_data)

            entry = {
                &quot;key_path&quot;:        row.get(&quot;KeyPath&quot;, &quot;&quot;),
                &quot;value_name&quot;:      row.get(&quot;ValueName&quot;, &quot;&quot;),
                &quot;value_data&quot;:      value_data[:500],
                &quot;hive&quot;:            row.get(&quot;HiveType&quot;, &quot;&quot;),
                &quot;last_write_time&quot;: row.get(&quot;LastWriteTimestamp&quot;, &quot;&quot;),
                &quot;suspicious&quot;:      susp,
                &quot;reason&quot;:          reason,
                &quot;mitre_technique&quot;: technique,
                &quot;kill_chain_stage&quot;: stage,
                &quot;confidence&quot;:      &quot;high&quot; if susp else &quot;low&quot;,
            }
            entries.append(entry)
            if susp:
                suspicious.append(entry)
            if len(entries) &gt;= MAX_ENTRIES:
                break

    return {
        &quot;tool&quot;: &quot;RECmd&quot;,
        &quot;hive_dir&quot;: hive_dir,
        &quot;total_entries&quot;: len(entries),
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;persistence_entries&quot;: entries,
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: None,
    }


# ── RegRipper fallback ─────────────────────────────────────────────────────

REGRIPPER_PLUGINS = [&quot;run&quot;, &quot;autoruns&quot;, &quot;winlogon&quot;, &quot;services&quot;, &quot;appinitdlls&quot;, &quot;ifeo&quot;]


def _run_regripper(hive_dir: str, output_dir: str) -&gt; dict:
    hive_path = Path(hive_dir)

    # Locate hive files (case-insensitive)
    hive_files = {
        f.name.lower(): f
        for f in hive_path.rglob(&quot;*&quot;)
        if f.is_file() and f.suffix.lower() in (&quot;&quot;, &quot;.dat&quot;)
           and f.name.lower() in (
               &quot;software&quot;, &quot;system&quot;, &quot;ntuser.dat&quot;, &quot;sam&quot;, &quot;security&quot;
           )
    }

    if not hive_files:
        return tool_missing_response(
            &quot;RECmd / RegRipper&quot;,
            &quot;Install RECmd from https://ericzimmerman.github.io/ &quot;
            &quot;or RegRipper: sudo apt-get install regripper&quot;,
        )

    entries:   list[dict] = []
    suspicious: list[dict] = []
    errors = []

    for hive_name, hive_file in hive_files.items():
        for plugin in REGRIPPER_PLUGINS:
            r = run_tool(
                [&quot;regripper&quot;, &quot;-r&quot;, str(hive_file), &quot;-p&quot;, plugin],
                timeout=60,
            )
            if r[&quot;tool_missing&quot;]:
                errors.append(&quot;RegRipper not found&quot;)
                break
            if r[&quot;returncode&quot;] != 0:
                continue

            save_raw_output(output_dir, f&quot;regripper_{hive_name}_{plugin}.txt&quot;, r[&quot;stdout&quot;])

            for block in r[&quot;stdout&quot;].split(&quot;\n\n&quot;):
                if not block.strip():
                    continue
                susp, reason, technique, stage = _score_value(block)
                entry = {
                    &quot;key_path&quot;:        _extract_key_path(block),
                    &quot;value_data&quot;:      block[:500],
                    &quot;hive&quot;:            hive_name,
                    &quot;plugin&quot;:          plugin,
                    &quot;suspicious&quot;:      susp,
                    &quot;reason&quot;:          reason,
                    &quot;mitre_technique&quot;: technique,
                    &quot;kill_chain_stage&quot;: stage,
                    &quot;confidence&quot;:      &quot;high&quot; if susp else &quot;low&quot;,
                }
                entries.append(entry)
                if susp:
                    suspicious.append(entry)
                if len(entries) &gt;= MAX_ENTRIES:
                    break

    return {
        &quot;tool&quot;: &quot;RegRipper&quot;,
        &quot;hive_dir&quot;: hive_dir,
        &quot;total_entries&quot;: len(entries),
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;persistence_entries&quot;: entries,
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: &quot;; &quot;.join(errors) if errors else None,
    }


# ── shared helpers ─────────────────────────────────────────────────────────

def _score_value(value: str) -&gt; tuple[bool, str, str, str]:
    for pattern, reason, technique, stage in SUSPICIOUS_PATTERNS:
        if re.search(pattern, value, re.IGNORECASE):
            return True, reason, technique, stage
    return False, &quot;&quot;, &quot;&quot;, &quot;&quot;


def _extract_key_path(block: str) -&gt; str:
    for line in block.splitlines():
        if &quot;\\&quot; in line and (&quot;Software&quot; in line or &quot;System&quot; in line):
            return line.strip()[:200]
    return &quot;&quot;

<textarea hidden id="src-20">&quot;&quot;&quot;Supertimeline builder — build_supertimeline MCP tool function.

Runs log2timeline.py (Plaso) to build a .plaso database from all evidence
sources, then exports with psort.py to CSV. Returns a bounded slice of the
most suspicious timeline entries — not the full CSV.

New function — not present in marez8505/find-evil.
&quot;&quot;&quot;

import csv
import re
from pathlib import Path
from parsers.common import run_tool, save_raw_output, tool_missing_response

MAX_ENTRIES = 500

INSTALL_HINT = (
    &quot;log2timeline.py not found. &quot;
    &quot;Install Plaso: sudo apt-get install -y python3-plaso  &quot;
    &quot;or pip3 install plaso&quot;
)

# ── Suspicious timeline patterns ──────────────────────────────────────────
# Applied to the &#x27;message&#x27; column of psort CSV output
SUSPICIOUS_TIMELINE_PATTERNS: list[tuple[str, str, str, str]] = [
    (
        r&quot;(powershell|cmd\.exe|mshta|wscript|cscript).{0,80}(-enc|/c\s|http)&quot;,
        &quot;Scripting/LOL binary with suspicious arguments in timeline&quot;,
        &quot;T1059&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;\\start menu\\programs\\startup\\&quot;,
        &quot;File written to startup folder&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;(certutil|bitsadmin).{0,60}(urlcache|transfer|http)&quot;,
        &quot;Download cradle activity in timeline&quot;,
        &quot;T1105&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;delete\s+shadows|vssadmin.{0,30}delete&quot;,
        &quot;VSS shadow copy deletion&quot;,
        &quot;T1490&quot;, &quot;impact&quot;,
    ),
    (
        r&quot;(\\temp\\|\\tmp\\|appdata\\local\\temp\\).{0,60}\.(exe|dll|ps1|bat)&quot;,
        &quot;Executable written to temp directory&quot;,
        &quot;T1204&quot;, &quot;execution&quot;,
    ),
    (
        r&quot;(registry|software\\microsoft\\windows\\currentversion\\run)&quot;,
        &quot;Registry run-key modification in timeline&quot;,
        &quot;T1547.001&quot;, &quot;persistence&quot;,
    ),
    (
        r&quot;security.evtx.*cleared|log\s+cleared&quot;,
        &quot;Security log cleared&quot;,
        &quot;T1070.001&quot;, &quot;defense-evasion&quot;,
    ),
    (
        r&quot;scheduled.task|schtasks&quot;,
        &quot;Scheduled task activity in timeline&quot;,
        &quot;T1053.005&quot;, &quot;persistence&quot;,
    ),
]


def build_supertimeline(evidence_dir: str, output_dir: str,
                        filter_date: str = &quot;&quot;) -&gt; dict:
    &quot;&quot;&quot;Build a supertimeline from all evidence in evidence_dir using Plaso.

    Step 1 — log2timeline.py: parses all supported artefacts in evidence_dir
             and writes case.plaso.
    Step 2 — psort.py: exports to CSV, optionally filtered by date range.
    Step 3 — Returns bounded slice of suspicious timeline entries.

    Args:
        evidence_dir: Directory containing disk image, memory, evtx, pcap
        output_dir:   Write directory for .plaso and CSV (audit trail)
        filter_date:  Optional psort date filter e.g. &quot;2024-01-15T00:00:00
                      TO 2024-01-16T00:00:00&quot;

    Returns:
        {
            tool, evidence_dir, plaso_path, csv_path,
            total_entries, suspicious_count,
            suspicious: [ {datetime, source, source_type, message,
                           reason, mitre_technique, kill_chain_stage,
                           confidence} ],
            error
        }
    &quot;&quot;&quot;
    plaso_path = str(Path(output_dir) / &quot;case.plaso&quot;)
    csv_path   = str(Path(output_dir) / &quot;timeline.csv&quot;)

    # ── Step 1: log2timeline ──
    log2tl = run_tool(
        [&quot;log2timeline.py&quot;, &quot;--status_view&quot;, &quot;none&quot;,
         &quot;--storage_file&quot;, plaso_path, evidence_dir],
        timeout=1800,   # 30 min — Plaso can be slow on large images
    )

    if log2tl[&quot;tool_missing&quot;]:
        return tool_missing_response(&quot;log2timeline.py (Plaso)&quot;, INSTALL_HINT)

    save_raw_output(output_dir, &quot;log2timeline_stderr.txt&quot;, log2tl[&quot;stderr&quot;])

    if log2tl[&quot;returncode&quot;] not in (0, 1) or not Path(plaso_path).exists():
        return {
            &quot;error&quot;: f&quot;log2timeline failed: {log2tl[&#x27;stderr&#x27;][:500]}&quot;,
            &quot;suspicious&quot;: [], &quot;total_entries&quot;: 0,
        }

    # ── Step 2: psort export to CSV ──
    psort_cmd = [
        &quot;psort.py&quot;, &quot;-o&quot;, &quot;l2tcsv&quot;,
        &quot;-w&quot;, csv_path,
        plaso_path,
    ]
    if filter_date:
        psort_cmd += [&quot;--slice&quot;, filter_date]

    psort = run_tool(psort_cmd, timeout=600)
    save_raw_output(output_dir, &quot;psort_stderr.txt&quot;, psort[&quot;stderr&quot;])

    if not Path(csv_path).exists():
        return {
            &quot;error&quot;: f&quot;psort produced no CSV: {psort[&#x27;stderr&#x27;][:500]}&quot;,
            &quot;suspicious&quot;: [], &quot;total_entries&quot;: 0,
            &quot;plaso_path&quot;: plaso_path,
        }

    # ── Step 3: score entries ──
    suspicious, total = _score_timeline_csv(csv_path)

    return {
        &quot;tool&quot;: &quot;plaso/log2timeline+psort&quot;,
        &quot;evidence_dir&quot;: evidence_dir,
        &quot;plaso_path&quot;: plaso_path,
        &quot;csv_path&quot;: csv_path,
        &quot;total_entries&quot;: total,
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious[:MAX_ENTRIES],
        &quot;error&quot;: None,
    }


# ── CSV scorer ─────────────────────────────────────────────────────────────

def _score_timeline_csv(csv_path: str) -&gt; tuple[list[dict], int]:
    &quot;&quot;&quot;Read psort l2tcsv and return (suspicious_entries, total_count).&quot;&quot;&quot;
    suspicious: list[dict] = []
    total = 0

    with open(csv_path, newline=&quot;&quot;, encoding=&quot;utf-8&quot;, errors=&quot;replace&quot;) as f:
        reader = csv.DictReader(f)
        for row in reader:
            total += 1
            # l2tcsv has no &quot;message&quot; column; its text lives in desc/short.
            message = (row.get(&quot;message&quot;) or row.get(&quot;Message&quot;)
                       or row.get(&quot;desc&quot;) or row.get(&quot;short&quot;) or &quot;&quot;).lower()
            if not message:
                continue

            for pattern, reason, technique, stage in SUSPICIOUS_TIMELINE_PATTERNS:
                if re.search(pattern, message, re.IGNORECASE):
                    suspicious.append({
                        &quot;datetime&quot;:        row.get(&quot;datetime&quot;) or row.get(&quot;timestamp&quot;, &quot;&quot;),
                        &quot;source&quot;:          row.get(&quot;source&quot;) or row.get(&quot;Source&quot;, &quot;&quot;),
                        &quot;source_type&quot;:     row.get(&quot;source_long&quot;) or row.get(&quot;SourceType&quot;, &quot;&quot;),
                        &quot;message&quot;:         message[:400],
                        &quot;reason&quot;:          reason,
                        &quot;mitre_technique&quot;: technique,
                        &quot;kill_chain_stage&quot;: stage,
                        &quot;confidence&quot;:      &quot;medium&quot;,
                    })
                    break

    return suspicious, total

<textarea hidden id="src-21">&quot;&quot;&quot;Volatility 3 memory analysis — three MCP tool functions.

analyze_memory_processes  — process tree + command lines, parent-child flags
analyze_memory_network    — netscan, external connection flags
analyze_memory_malfind    — injected code / hollowed process detection

Based in part on marez8505/find-evil volatility.py (MIT licence).
&quot;&quot;&quot;

import re
from parsers.common import run_tool, save_raw_output, tool_missing_response, is_private_ip

# ── Suspicious parent → child sets ────────────────────────────────────────
SUSPICIOUS_PARENTS: dict[str, set[str]] = {
    &quot;winword.exe&quot;:   {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;, &quot;wscript.exe&quot;, &quot;cscript.exe&quot;, &quot;mshta.exe&quot;},
    &quot;excel.exe&quot;:     {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;, &quot;wscript.exe&quot;, &quot;cscript.exe&quot;, &quot;mshta.exe&quot;},
    &quot;outlook.exe&quot;:   {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;, &quot;wscript.exe&quot;, &quot;cscript.exe&quot;, &quot;mshta.exe&quot;},
    &quot;powerpnt.exe&quot;:  {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;, &quot;wscript.exe&quot;, &quot;cscript.exe&quot;},
    &quot;chrome.exe&quot;:    {&quot;powershell.exe&quot;, &quot;cmd.exe&quot;},
    &quot;firefox.exe&quot;:   {&quot;powershell.exe&quot;, &quot;cmd.exe&quot;},
    &quot;msedge.exe&quot;:    {&quot;powershell.exe&quot;, &quot;cmd.exe&quot;},
    &quot;lsass.exe&quot;:     {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;, &quot;net.exe&quot;},
    &quot;spoolsv.exe&quot;:   {&quot;cmd.exe&quot;, &quot;powershell.exe&quot;},
    &quot;svchost.exe&quot;:   {&quot;powershell.exe&quot;, &quot;cmd.exe&quot;},   # svchost rarely spawns user shells
}

WRITABLE_PATH_RE = re.compile(
    r&quot;(\\temp\\|\\tmp\\|\\appdata\\local\\temp\\|\\users\\public\\|\\programdata\\)&quot;,
    re.IGNORECASE,
)

INSTALL_HINT = &quot;pip3 install volatility3&quot;


# ── analyze_memory_processes ──────────────────────────────────────────────

def analyze_memory_processes(image_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Analyse running processes from a memory image using Volatility 3.

    Runs windows.pstree and windows.cmdline. Flags anomalous parent-child
    pairs and processes executing from temp/writable paths.

    Args:
        image_path: Absolute path to memory image (.vmem / .raw / .mem)
        output_dir: Write directory for raw output (audit trail)

    Returns:
        {
            tool, image, total_processes, suspicious_count,
            suspicious: [ {pid, ppid, name, parent_name, cmdline,
                           reason, mitre_technique, kill_chain_stage,
                           confidence} ],
            error
        }
    &quot;&quot;&quot;
    # ── pstree ──
    pt = run_tool([&quot;vol&quot;, &quot;-f&quot;, image_path, &quot;-q&quot;, &quot;windows.pstree&quot;], timeout=180)
    if pt[&quot;tool_missing&quot;]:
        return tool_missing_response(&quot;Volatility 3 (vol)&quot;, INSTALL_HINT)
    save_raw_output(output_dir, &quot;vol_pstree.txt&quot;, pt[&quot;stdout&quot;])

    # ── cmdline ──
    cl = run_tool([&quot;vol&quot;, &quot;-f&quot;, image_path, &quot;-q&quot;, &quot;windows.cmdline&quot;], timeout=180)
    save_raw_output(output_dir, &quot;vol_cmdline.txt&quot;, cl[&quot;stdout&quot;])

    # Build PID → cmdline map
    cmdlines: dict[int, str] = {}
    for line in cl[&quot;stdout&quot;].splitlines():
        parts = line.strip().split(&quot;\t&quot;)
        if len(parts) &gt;= 3:
            try:
                cmdlines[int(parts[0])] = parts[2].strip()
            except ValueError:
                pass

    # Build PID → name map (for parent lookup)
    pid_to_name: dict[int, str] = {}
    for line in pt[&quot;stdout&quot;].splitlines():
        p = _parse_pstree_line(line)
        if p:
            pid_to_name[p[&quot;pid&quot;]] = p[&quot;name&quot;].lower()

    # Score each process
    suspicious: list[dict] = []
    total = 0

    for line in pt[&quot;stdout&quot;].splitlines():
        p = _parse_pstree_line(line)
        if not p:
            continue
        total += 1

        name   = p[&quot;name&quot;].lower()
        parent = pid_to_name.get(p[&quot;ppid&quot;], &quot;&quot;).lower()
        cmd    = cmdlines.get(p[&quot;pid&quot;], &quot;&quot;)

        entry: dict = {
            &quot;pid&quot;: p[&quot;pid&quot;], &quot;ppid&quot;: p[&quot;ppid&quot;],
            &quot;name&quot;: p[&quot;name&quot;], &quot;parent_name&quot;: parent or &quot;unknown&quot;,
            &quot;cmdline&quot;: cmd[:300],
        }

        if name in SUSPICIOUS_PARENTS.get(parent, set()):
            entry.update(
                reason=f&quot;{parent} spawning {name}&quot;,
                mitre_technique=&quot;T1059&quot;,
                kill_chain_stage=&quot;execution&quot;,
                confidence=&quot;high&quot;,
            )
            suspicious.append(entry)
        elif WRITABLE_PATH_RE.search(cmd):
            entry.update(
                reason=&quot;Process executing from temp/writable path&quot;,
                mitre_technique=&quot;T1204&quot;,
                kill_chain_stage=&quot;execution&quot;,
                confidence=&quot;medium&quot;,
            )
            suspicious.append(entry)

    return {
        &quot;tool&quot;: &quot;volatility3/windows.pstree+cmdline&quot;,
        &quot;image&quot;: image_path,
        &quot;total_processes&quot;: total,
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: pt[&quot;stderr&quot;] if pt[&quot;returncode&quot;] != 0 else None,
    }


def _parse_pstree_line(line: str) -&gt; dict | None:
    &quot;&quot;&quot;Parse one volatility pstree line → {pid, ppid, name} or None.&quot;&quot;&quot;
    parts = line.strip().split()
    if len(parts) &lt; 3:
        return None
    try:
        return {&quot;pid&quot;: int(parts[0]), &quot;ppid&quot;: int(parts[1]), &quot;name&quot;: parts[2]}
    except ValueError:
        return None


# ── analyze_memory_network ─────────────────────────────────────────────────

def analyze_memory_network(image_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Extract network connections from memory using Volatility 3 netscan.

    Flags connections from unexpected processes to non-RFC-1918 addresses.

    Args:
        image_path: Absolute path to memory image
        output_dir: Write directory for raw output

    Returns:
        {
            tool, image, total_connections, suspicious_count,
            suspicious: [ {offset, proto, local_addr, foreign_addr,
                           state, pid, owner, reason, mitre_technique,
                           kill_chain_stage, confidence} ],
            error
        }
    &quot;&quot;&quot;
    r = run_tool([&quot;vol&quot;, &quot;-f&quot;, image_path, &quot;-q&quot;, &quot;windows.netscan&quot;], timeout=180)
    if r[&quot;tool_missing&quot;]:
        return tool_missing_response(&quot;Volatility 3 (vol)&quot;, INSTALL_HINT)
    save_raw_output(output_dir, &quot;vol_netscan.txt&quot;, r[&quot;stdout&quot;])

    # Processes that commonly make external connections — lower suspicion threshold
    EXPECTED_EXTERNAL = {
        &quot;svchost.exe&quot;, &quot;system&quot;, &quot;searchindexer.exe&quot;,
        &quot;msmpeng.exe&quot;, &quot;msiexec.exe&quot;, &quot;wuauclt.exe&quot;,
    }

    connections: list[dict] = []
    suspicious:  list[dict] = []

    for line in r[&quot;stdout&quot;].splitlines():
        parts = line.strip().split()
        # Header / blank lines
        if len(parts) &lt; 6 or parts[0] in (&quot;Offset&quot;, &quot;#&quot;, &quot;&quot;):
            continue
        try:
            entry = {
                &quot;offset&quot;:       parts[0],
                &quot;proto&quot;:        parts[1],
                &quot;local_addr&quot;:   parts[2],
                &quot;foreign_addr&quot;: parts[3],
                &quot;state&quot;:        parts[4],
                &quot;pid&quot;:          parts[5],
                &quot;owner&quot;:        parts[6] if len(parts) &gt; 6 else &quot;?&quot;,
            }
            foreign_ip = entry[&quot;foreign_addr&quot;].split(&quot;:&quot;)[0]

            if (
                not is_private_ip(foreign_ip)
                and entry[&quot;owner&quot;].lower() not in EXPECTED_EXTERNAL
            ):
                entry.update(
                    reason=f&quot;External connection from {entry[&#x27;owner&#x27;]} → {foreign_ip}&quot;,
                    mitre_technique=&quot;T1071&quot;,
                    kill_chain_stage=&quot;command-and-control&quot;,
                    confidence=&quot;medium&quot;,
                )
                suspicious.append(entry)

            connections.append(entry)
        except IndexError:
            continue

    return {
        &quot;tool&quot;: &quot;volatility3/windows.netscan&quot;,
        &quot;image&quot;: image_path,
        &quot;total_connections&quot;: len(connections),
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: r[&quot;stderr&quot;] if r[&quot;returncode&quot;] != 0 else None,
    }


# ── analyze_memory_malfind ─────────────────────────────────────────────────

def analyze_memory_malfind(image_path: str, output_dir: str) -&gt; dict:
    &quot;&quot;&quot;Detect injected code regions using Volatility 3 malfind.

    MZ headers found outside normal image-load locations indicate code
    injection (T1055) or process hollowing (T1055.012).

    Args:
        image_path: Absolute path to memory image
        output_dir: Write directory for raw output

    Returns:
        {
            tool, image, suspicious_count,
            suspicious: [ {process, pid, address, vad_tag,
                           has_mz_header, reason, mitre_technique,
                           kill_chain_stage, confidence} ],
            error
        }
    &quot;&quot;&quot;
    r = run_tool([&quot;vol&quot;, &quot;-f&quot;, image_path, &quot;-q&quot;, &quot;windows.malfind&quot;], timeout=300)
    if r[&quot;tool_missing&quot;]:
        return tool_missing_response(&quot;Volatility 3 (vol)&quot;, INSTALL_HINT)
    save_raw_output(output_dir, &quot;vol_malfind.txt&quot;, r[&quot;stdout&quot;])

    suspicious: list[dict] = []
    current:    dict       = {}

    for line in r[&quot;stdout&quot;].splitlines():
        line = line.strip()

        if not line:
            if current:
                suspicious.append(current)
                current = {}
            continue

        if line.startswith(&quot;Process:&quot;):
            parts = line.split()
            current = {
                &quot;process&quot;:         parts[1] if len(parts) &gt; 1 else &quot;?&quot;,
                &quot;pid&quot;:             parts[3] if len(parts) &gt; 3 else &quot;?&quot;,
                &quot;has_mz_header&quot;:   False,
                &quot;mitre_technique&quot;: &quot;T1055&quot;,
                &quot;kill_chain_stage&quot;:&quot;defense-evasion&quot;,
                &quot;confidence&quot;:      &quot;medium&quot;,
                &quot;reason&quot;:          &quot;Injected memory region (no MZ header)&quot;,
            }
        elif line.startswith(&quot;VAD&quot;) or &quot;VadTag&quot; in line:
            current[&quot;vad_tag&quot;] = line[:120]
        elif re.search(r&quot;(0x4d5a|MZ\s)&quot;, line, re.IGNORECASE) or line[:2] in (&quot;MZ&quot;,):
            current[&quot;has_mz_header&quot;] = True
            current[&quot;confidence&quot;]    = &quot;high&quot;
            current[&quot;reason&quot;]        = &quot;MZ header in injected region — likely code injection or hollowing&quot;
            current[&quot;mitre_technique&quot;] = &quot;T1055.012&quot;

    if current:
        suspicious.append(current)

    return {
        &quot;tool&quot;: &quot;volatility3/windows.malfind&quot;,
        &quot;image&quot;: image_path,
        &quot;suspicious_count&quot;: len(suspicious),
        &quot;suspicious&quot;: suspicious,
        &quot;error&quot;: r[&quot;stderr&quot;] if r[&quot;returncode&quot;] != 0 else None,
    }
